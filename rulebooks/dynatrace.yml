---
- name: Listen for events on a webhook from Dynatace
  hosts: all
  sources:
    - name: Listen for alerts from Dynatrace
      eda.builtin.webhook:
        host: 0.0.0.0
        port: 4997

  rules:
    - name: High CPU Usage Detected
      condition: event.payload.eventData['event.name'] == "CPU Saturation"
      action:
        run_workflow_template:
          name: "Automated Response High CPU EDA"
          organization: "Infrastructure"
          job_args:
            extra_vars:
              vm_name: "{{ event.payload.eventData['host.name'][0] }}"

    - name: Web Application Down Detected
      condition: |
        event.payload.eventData['event.description'] is search("Minimum process count not met for the rule: HTTPD Host Monitor") or event.payload.eventData['event.description'] is search("Minimum process count not met for the rule: IIS Host Monitor")
      action:
        run_workflow_template:
          name: "Automated Response Web Server EDA"
          organization: "Infrastructure"
          job_args:
            extra_vars:
              vm_name: "{{ event.payload.eventData['host.name'][0] }}"
